<!DOCTYPE html>
<html>
<head>
    <title>Mental Health Prediction System</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            text-align: center;
            color: white;
        }

        .container {
            margin-top: 150px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            margin-bottom: 40px;
        }

        .btn {
            padding: 12px 25px;
            font-size: 16px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }

        .login {
            background-color: #28a745;
        }

        .register {
            background-color: #007bff;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Mental Health Risk Prediction</h1>
    <p>Check your mental health risk using AI-based prediction system</p>

    <a href="/login" class="btn login">Login</a>
    <a href="/register" class="btn register">Register</a>
</div>

</body>
</html>
